name: Unity CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  BUILD_NAME: MiniTransportTycoon
  UNITY_VERSION: 6000.3.7f1
  IMAGE: unityci/editor
  IMAGE_VERSION: 3
  UNITY_DIR: ${{ github.workspace }}/MiniTransportTycoon
  VERSION_NUMBER_VAR: ${{ github.ref_name }}-${{ github.run_number }}-${{ github.run_attempt }}
  VERSION_BUILD_VAR: ${{ github.run_number }}

jobs:
  test:
    name: Test ${{ matrix.testPlatform }}
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:6000.3.7f1-base-3
    strategy:
      fail-fast: false
      matrix:
        testPlatform:
          - editmode
          - playmode
    env:
      TEST_PLATFORM: ${{ matrix.testPlatform }}
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_DIR }}/Library
          key: Library-${{ runner.os }}-${{ matrix.testPlatform }}-${{ hashFiles('MiniTransportTycoon/Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.testPlatform }}-
            Library-${{ runner.os }}-

      - name: Prepare Unity license
        run: chmod +x ./ci/before_script.sh && ./ci/before_script.sh

      - name: Run Unity tests
        shell: bash
        run: |
          chmod +x ./ci/test.sh ./ci/nunit2junit.sh
          set +e
          ./ci/test.sh
          TEST_EXIT_CODE=$?
          ./ci/nunit2junit.sh || true
          exit $TEST_EXIT_CODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.testPlatform }}-test-results
          path: |
            ${{ env.UNITY_DIR }}/${{ matrix.testPlatform }}-results.xml
            ${{ env.UNITY_DIR }}/${{ matrix.testPlatform }}-junit-report.xml
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.testPlatform }}-coverage
          path: ${{ env.UNITY_DIR }}/${{ matrix.testPlatform }}-coverage
          if-no-files-found: warn

  build-desktop:
    name: Build ${{ matrix.buildTarget }}
    runs-on: ubuntu-latest
    needs: test
    container:
      image: unityci/editor:6000.3.7f1-${{ matrix.imageSuffix }}-3
    strategy:
      fail-fast: false
      matrix:
        include:
          - buildTarget: StandaloneLinux64
            imageSuffix: base
          - buildTarget: StandaloneWindows64
            imageSuffix: windows-mono
          - buildTarget: StandaloneOSX
            imageSuffix: mac-mono
    env:
      BUILD_TARGET: ${{ matrix.buildTarget }}
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_DIR }}/Library
          key: Library-${{ runner.os }}-${{ matrix.buildTarget }}-${{ hashFiles('MiniTransportTycoon/Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.buildTarget }}-
            Library-${{ runner.os }}-

      - name: Prepare Unity license
        run: chmod +x ./ci/before_script.sh && ./ci/before_script.sh

      - name: Build player
        run: chmod +x ./ci/build.sh && ./ci/build.sh

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.buildTarget }}-build
          path: ${{ env.UNITY_DIR }}/Builds/${{ matrix.buildTarget }}
          if-no-files-found: error

  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    container:
      image: unityci/editor:6000.3.7f1-webgl-3
    env:
      BUILD_TARGET: WebGL
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_DIR }}/Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('MiniTransportTycoon/Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ runner.os }}-WebGL-
            Library-${{ runner.os }}-

      - name: Prepare Unity license
        run: chmod +x ./ci/before_script.sh && ./ci/before_script.sh

      - name: Build WebGL player
        run: chmod +x ./ci/build.sh && ./ci/build.sh

      - name: Upload WebGL build
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: ${{ env.UNITY_DIR }}/Builds/WebGL/${{ env.BUILD_NAME }}
          if-no-files-found: error

  analyze:
    name: Analyze C# code
    runs-on: ubuntu-latest
    needs: test
    container:
      image: unityci/editor:6000.3.7f1-base-3
    env:
      ANALYZERS_DIR: /analyzers
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Unity license
        run: chmod +x ./ci/before_script.sh && ./ci/before_script.sh

      - name: Generate project files
        run: chmod +x ./ci/generate_project_files.sh && ./ci/generate_project_files.sh

      - name: Run Roslynator
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet tool install --global Roslynator.DotNet.Cli --version 0.10.2
          nuget install Microsoft.Unity.Analyzers -Version 1.26.0 -OutputDirectory "$ANALYZERS_DIR"
          SLN_FILE=$(find "$UNITY_DIR" -maxdepth 1 -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "No solution file found under $UNITY_DIR"
            exit 1
          fi
          roslynator analyze "$SLN_FILE" -o ./roslynator.xml --analyzer-assemblies "$ANALYZERS_DIR" || true

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roslynator-report
          path: roslynator.xml
          if-no-files-found: warn

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build-webgl
      - test
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: public

      - name: Download editmode coverage
        uses: actions/download-artifact@v4
        with:
          name: editmode-coverage
          path: public/coverage

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
